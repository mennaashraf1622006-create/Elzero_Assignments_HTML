<! doctype html >
<html>
    <head>
        <meta charset="UTF-8="/>
        <title> 
        </title>

    </head>

<body>
    <form action="" method="get">
        <div>
        <label for="email">Email</label>
        <input 
         id="email"
         type="email" 
         name="email"
         readonly
         value="o@0.com">
        </div>
        <div>
        <label for="username">Username</label>
        <input 
        id="username"
         type="text"
         name="username" 
         autofocus
         required
         minlength="5" 
         maxlength="20">
        </div>
        <div>
        <label for="token">Token</label>
        <input 
        id="token" 
        type="hidden" 
        name="token"
        value="b92f1fc2fce391ad7af633723afd3055">
        </div>
        <div>
        <input type="reset" value="Empty">
        </div>
        <div>
            <input type="submit" value="Send">
        </div>
        

    </form>

</body>
</html>
