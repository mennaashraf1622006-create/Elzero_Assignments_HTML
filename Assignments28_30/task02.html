<! doctype html >
<html>
    <head>
        <meta charset="UTF-8="/>
        <title>
        </title>
    </head>
<body>
    <form action="" method="get">
        <div>
        <label for="email">Email</label>
        <input 
         id="email"
         type="email" 
         name="email"
         readonly
         value="o@0.com">
        </div>
        <br>
        <div>
        <label for="username">Username</label>
        <input 
        id="username"
         type="text"
         name="username" 
         autofocus
         required
         minlength="5" 
         maxlength="20">
        </div>
        <br>
        <div>
        <label for="token">Token</label>
        <input 
        id="token" 
        type="hidden" 
        name="token"
        value="b92f1fc2fce391ad7af633723afd3055">
        </div>
        <br>
        
        <!-- Checkbox -->
        <div><p>Skills</p></div>
        <div>
            <input
            type="checkbox"
            name="skills"
            id="problem"
            value="problem Solving"
            checked>
            <label for="problem">problem Solving</label>
        </div>
        <div>
            <input
            type="checkbox"
            name="skills"
            id="logical"
            value="Logical Thinking">
            <label for="logical">Logical Thinking</label>
        </div>
        <div>
            <input
            type="checkbox"
            name="skills"
            id="advanced"
            value="Advanced Search">
            <label for="advanced">Advanced Search</label>
        </div>
        <div>
            <input
            type="checkbox"
            name="skills"
            id="analysis"
            value="Analysis">
            <label for="analysis">Analysis</label>
        </div>
        <div>
            <input
            type="checkbox"
            name="skills"
            id="planning"
            value="Planning">
            <label for="planing">Planning</label>
        </div>
        <br>
        <!-- Radio -->
        <div>
            <p>Job</p>
        </div>

        <div>
            <input
            type="radio"
            name="job"
            id="fronted"
            value="Fronted_End Developer"
            checked>
            <label for="front">Front_End Developer</label>
        </div>

        <div>
            <input
            type="radio"
            name="job"
            id="backend"
            value="Back_End Developer">
            <label for="backend>Back_End Developer</label>
        </div>

        <div>
            <input
            type="radio"
            name="job"
            id="business"
            value="Business Analyst">
            <label for="business">Business Analyst</label>
        </div>

        <div>
            <input
            type="radio"
            name="job"
            id="project"
            value="Project Manager">
            <label for="project">Project Manager</label>
        </div>

        <div>
            <input
            type="radio"
            name="job"
            id="scrum"
            value="Scrum Master"
            checked>
            <label for="scrum">Scrum Master</label>
        </div>
        <br>
        <div>
        <input type="reset" value="Empty">
        </div>
        <div>
            <input type="submit" value="Send">
        </div>
    </form>


</body>
</html>
